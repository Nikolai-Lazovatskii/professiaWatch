name: daily-job-check

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 08:00 в Братиславе (лето)
  workflow_dispatch: {}    # кнопка ручного запуска в GitHub UI

permissions:
  contents: write          # чтобы коммитить data/seen_offers.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run profesia-watch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Europe/Bratislava
        run: python -m jobwatch.check

      - name: Persist seen-offers state
        run: |
          git config user.name "jobwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/seen_offers.json || true
          git commit -m "state: $(date -u +%F)" || echo "no state changes"
          git push
