# profesia-watch configuration
# Профиль под резюме: Applied Informatics (FMFI UK), DevOps/MLOps,
# Python/TypeScript, Docker, K8s, backend.
#
# ПРАВИЛО МАТЧИНГА: вакансия проходит, только если в ней есть настоящий
# IT-сигнал — минимум `min_strong` сильных слов в полном тексте, ЛИБО хотя бы
# одно сильное слово прямо в заголовке. Слабые слова лишь добавляют баллы,
# сами по себе матч не дают. Слова матчатся без учёта регистра и диакритики.

regions:
  - bratislavsky-kraj
  - trnavsky-kraj

job_types:
  - internship-staz      # internship, stáž
  - na-dohodu-brigady    # brigády
  # - skrateny-uvazok    # раскомментируй, если нужен и skrátený úväzok

count_days: 2        # окно поиска для ежедневных запусков (дубли отсеет state)
first_run_days: 7    # окно для самого первого запуска
max_pages: 5
min_score: 2         # минимальная сумма баллов (strong=2, weak=1)
min_strong: 2        # сильных слов в тексте для матча (или 1 сильное в заголовке)
fetch_details: true  # заходить внутрь объявления и матчить полный текст
request_delay: 0.8
notify_empty: true   # присылать "ничего нового", чтобы видеть, что бот жив
run_at: "08:00"      # время автопроверки в режиме бота (TZ Europe/Bratislava)

